[package]
name = "shortcake"
version = "0.1.0-pre.1"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "A SAS-based (Short Authentication String) authenticated key exchange protocol"
repository = "https://github.com/kevinlewi/shortcake"
keywords = ["crypto", "key-exchange", "authentication", "sas"]
categories = ["cryptography"]
authors = ["Kevin Lewi"]

[dependencies]
digest = "0.10"
generic-array = "0.14"
hkdf = "0.12"
hmac = "0.12"
rand_core = "0.6"
sha2 = "0.10"
subtle = "2"
thiserror = "1"
x25519-dalek = { version = "2", features = ["getrandom", "static_secrets"] }
zeroize = { version = "1", features = ["derive"] }

[dev-dependencies]
hex = "0.4"
rand = "0.8"
